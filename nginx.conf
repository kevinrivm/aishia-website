server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable efficient file serving
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    # Never gzip video — it's already compressed and gzip blocks range requests
    gzip_types ~* "video/";

    # MP4 video — byte-range support is critical for smooth looping
    location ~* \.mp4$ {
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Content-Type "video/mp4" always;
        mp4;
        mp4_buffer_size     1m;
        mp4_max_buffer_size 5m;
    }

    # Static assets cache
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
